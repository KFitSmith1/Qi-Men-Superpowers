services:
  qi-men-superpowers:
    build: .
    ports:
      - "8787:8787"
    environment:
      # Optional: enables Astrology-API.io high-precision BaZi verification.
      # Without it the app uses its built-in local calculation.
      - ASTROLOGY_API_KEY=${ASTROLOGY_API_KEY:-}
      - ASTROLOGY_API_URL=${ASTROLOGY_API_URL:-}
      # Only needed if the frontend is hosted on a DIFFERENT origin (e.g. a
      # static web/ on here.now). For the single-container deploy the app is
      # same-origin and this can stay unset.
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN:-*}
      # Chat ("Ask" tab) — language model. Defaults to an offline stub if unset.
      - LLM_PROVIDER=${LLM_PROVIDER:-stub}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      # RAG — embeddings + vector store (InsForge storage bucket).
      - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER:-}
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL:-}
      - VECTOR_STORE=${VECTOR_STORE:-local}
      - INSFORGE_BASE_URL=${INSFORGE_BASE_URL:-}
      - INSFORGE_API_KEY=${INSFORGE_API_KEY:-}
      - INSFORGE_BUCKET=${INSFORGE_BUCKET:-}
      - INSFORGE_OBJECT=${INSFORGE_OBJECT:-}
    restart: unless-stopped
